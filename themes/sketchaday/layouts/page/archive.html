{{ define "main" }}
    <div class="bg-chaos text-[20vw] -top-10 -left-10 rotate-12 opacity-20">HISTORY</div>
    <div class="bg-chaos text-[15vw] bottom-1/4 -right-20 -rotate-6 opacity-10">INDEX</div>

    <main class="px-6 py-20 max-w-7xl mx-auto relative z-10">
        <div class="flex flex-col gap-12">
            <div class="space-y-4">
                <h1 class="carson-title text-7xl md:text-[12rem] font-black leading-none">
                    THE <br>
                    <span class="text-transparent" style="-webkit-text-stroke: 3px black;">ARCHIVE</span>
                </h1>
                <p class="mono-font text-sm uppercase font-bold opacity-60 max-w-md border-l-4 border-black pl-4">
                    A visual log of discipline and decay. <br>
                    Every day. Every mistake.
                </p>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-8">
                {{ range (where .Site.RegularPages "Section" "artwork").ByDate.Reverse }}
                <div class="punk-card relative bg-white p-3 shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] border-4 border-black rotate-1 grayscale hover:grayscale-0 cursor-pointer" onclick="window.location.href='{{ .RelPermalink }}'">
                    <img src="{{ .Params.image | default (printf "https://res.cloudinary.com/dodzkb914/image/upload/w_500,ar_1:1,c_fill,g_auto/%s" .Params.cloudinaryId) }}" class="w-full aspect-square object-cover mb-2 contrast-125">
                    <div class="flex justify-between items-baseline">
                        <p class="mono-font text-[10px] uppercase font-black">{{ .Date.Format "Jan 02" }}</p>
                        <p class="marker-font text-sm uppercase">{{ .Title }}</p>
                    </div>
                </div>
                {{ end }}
            </div>
        </div>
    </main>
{{ end }}
