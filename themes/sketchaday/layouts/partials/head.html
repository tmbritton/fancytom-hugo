    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Permanent+Marker&family=Courier+Prime&family=Rubik+Mono+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-yellow: #ccff00;
            --punk-pink: #ff00ff;
        }
        body {
            background-color: #b9b4a7; 
            font-family: 'Inter', sans-serif;
            color: #000;
            overflow-x: hidden;
            cursor: crosshair;
        }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        .mono-font { font-family: 'Courier Prime', monospace; }
        .heavy-font { font-family: 'Rubik Mono One', sans-serif; }
        
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.15;
            z-index: 9999;
            pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            mix-blend-mode: multiply;
        }

        .carson-title {
            line-height: 0.7;
            letter-spacing: -0.08em;
            text-transform: uppercase;
            transform: skewY(-2deg);
        }

        .bg-chaos {
            position: absolute;
            font-weight: 900;
            color: rgba(0,0,0,0.1);
            z-index: -1;
            white-space: nowrap;
            pointer-events: none;
            text-transform: uppercase;
            mix-blend-mode: multiply;
        }

        .punk-card {
            transition: all 0.1s ease-in-out;
            mix-blend-mode: normal;
        }
        .punk-card:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 100;
            filter: invert(1) contrast(2);
        }

        .glitch-text:hover {
            animation: glitch 0.2s infinite;
            color: var(--neon-yellow);
            background: black;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        .tape {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(2px);
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        .punk-block {
            background: white;
            border: 4px solid black;
            box-shadow: 15px 15px 0px 0px black;
            transition: all 0.2s ease;
        }
        .punk-block:hover {
            transform: scale(1.02) rotate(0deg) !important;
        }

        /* Lightbox Styles */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            cursor: zoom-out;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        #lightbox img {
            max-width: 100%;
            max-height: 100%;
            border: 8px solid white;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            object-fit: contain;
        }
        #lightbox-close {
            position: absolute;
            top: 20px; right: 20px;
            background: white;
            color: black;
            font-family: 'Permanent Marker', cursive;
            font-size: 2rem;
            padding: 5px 15px;
            cursor: pointer;
            border: 4px solid black;
            box-shadow: 5px 5px 0px 0px black;
        }
    </style>
