[build]
  command = "curl -fsSL https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o /usr/local/bin/tailwindcss && chmod +x /usr/local/bin/tailwindcss && hugo"

[context.deploy-preview.environment]
  HUGO_VERSION = "0.157.0"

[context.production.environment]
  HUGO_VERSION = "0.157.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "all, noai, noimageai"